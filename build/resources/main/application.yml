server:
  port: 8081
secret:
  key: oingisprettyintheworld1234567890

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pethub?useSSL=false&serverTimezone=Asia/Seoul
    username: root
    password:
  jpa:
    database-platform: org.hibernate.dialect.MySQL5Dialect #여기가문제1 나랑버전달라서 한번확인
    properties:
      hibernate:
        generate-ddl: true
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: create


  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
    org.hibernate.stat: INFO
    org.hibernate.hql.internal.ast.AST: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.type.descriptor.sql: INFO
