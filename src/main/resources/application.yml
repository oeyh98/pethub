server:
  port: 8081
secret:
  key: oingisprettyintheworld1234567890

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pethub?useSSL=false&serverTimezone=Asia/Seoul&createDatabaseIfNotExist=true&autoReconnect=true
    #url: jdbc:mysql://localhost:3306/pethub
    username: root
    password:
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        generate-ddl: true
        format_sql: true
        show_sql: true
        ddl-auto: create

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
